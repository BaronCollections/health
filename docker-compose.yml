version: '3.8'

services:
  # ──── Infrastructure ────
  postgres:
    image: postgres:16-alpine
    container_name: mintbit-db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-mintbit}
      POSTGRES_USER: ${DB_USER:-mintbit}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mintbit123}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-mintbit}"]
      interval: 10s
      retries: 5
    networks:
      - mintbit

  redis:
    image: redis:7-alpine
    container_name: mintbit-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - mintbit

  minio:
    image: minio/minio
    container_name: mintbit-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - mintbit

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: mintbit-mq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${MQ_USER:-mintbit}
      RABBITMQ_DEFAULT_PASS: ${MQ_PASSWORD:-mq123}
    volumes:
      - mq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - mintbit

  # ──── Application ────
  backend:
    build: ./backend
    container_name: mintbit-backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
      rabbitmq:
        condition: service_started
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-mintbit}
      DB_USER: ${DB_USER:-mintbit}
      DB_PASSWORD: ${DB_PASSWORD:-mintbit123}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${MQ_USER:-mintbit}
      RABBITMQ_PASSWORD: ${MQ_PASSWORD:-mq123}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_PASSWORD:-minioadmin}
      OCR_SERVICE_URL: http://ocr-service:8866
      POSTER_SERVICE_URL: http://poster-service:3001
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.anthropic.com}
      JWT_SECRET: ${JWT_SECRET:-mintbit-jwt-secret-change-me}
    ports:
      - "8080:8080"
    networks:
      - mintbit

  frontend:
    build: ./frontend
    container_name: mintbit-frontend
    restart: always
    environment:
      BACKEND_URL: http://backend:8080
    ports:
      - "3000:3000"
    networks:
      - mintbit

  poster-service:
    build: ./poster-service
    container_name: mintbit-poster
    restart: always
    ports:
      - "3001:3001"
    networks:
      - mintbit

  ocr-service:
    image: paddlecloud/paddleocr:2.9.1
    container_name: mintbit-ocr
    restart: always
    ports:
      - "8866:8866"
    networks:
      - mintbit

  # ──── Gateway ────
  nginx:
    image: nginx:alpine
    container_name: mintbit-nginx
    restart: always
    depends_on:
      - frontend
      - backend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
      - "443:443"
    networks:
      - mintbit

volumes:
  pg_data:
  redis_data:
  minio_data:
  mq_data:

networks:
  mintbit:
    driver: bridge
